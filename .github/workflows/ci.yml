name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src/

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/ -q -k "not integration and not e2e and not benchmark and not loadtest and not migration"

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Start Qdrant
        run: docker run -d -p 6333:6333 qdrant/qdrant
      - name: Run integration / e2e / benchmark tests
        run: pytest tests/ -q -k "integration or e2e or benchmark"

  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Validate JSON schemas
        run: python3 -c "import json, os; [json.load(open(f'contracts/{f}')) for f in os.listdir('contracts')]"
      - name: Run schema / contract tests
        run: pytest tests/ -q -k "schema or contract"

  migration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Install alembic
        run: pip install alembic
      - name: Create tables
        run: python3 -c "from sqlalchemy import create_engine; from storage.base import Base; engine = create_engine('sqlite:///memory.db'); Base.metadata.create_all(engine)"
      - name: Run migration test
        run: alembic upgrade head && alembic downgrade -1

  release-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --upgrade pip build
      - name: Build sdist and wheel
        run: python -m build
      - name: Smoke install wheel
        run: |
          python -m venv /tmp/cmms-wheel-smoke
          /tmp/cmms-wheel-smoke/bin/pip install dist/*.whl
          /tmp/cmms-wheel-smoke/bin/python -c "import memory_server, storage; assert memory_server.__version__ == '0.11.0b1'"
          /tmp/cmms-wheel-smoke/bin/memory-server --help
