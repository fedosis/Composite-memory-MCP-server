name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src/

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/ -q -k "not integration and not e2e and not benchmark and not loadtest and not migration"

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Install alembic
        run: pip install alembic
      - name: Start Qdrant
        run: docker run -d -p 6333:6333 qdrant/qdrant
      - name: Run integration / e2e / benchmark tests
        run: pytest tests/ -q -k "integration or e2e or benchmark"

  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Validate JSON schemas
        run: python3 -c "import json, glob; [json.load(open(f)) for f in glob.glob('contracts/*.schema.json')]"
      - name: Run schema / contract tests
        run: pytest tests/ -q -k "schema or contract"

  migration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Install alembic
        run: pip install alembic
      - name: Create tables
        run: python3 -c "from sqlalchemy import create_engine; from storage.base import Base; engine = create_engine('sqlite:///memory.db'); Base.metadata.create_all(engine)"
      - name: Run migration test
        run: alembic upgrade head && alembic downgrade -1

  release-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --upgrade pip build
      - name: Build sdist and wheel
        run: python -m build
      - name: Smoke install wheel
        run: |
          python -m venv /tmp/cmms-wheel-smoke
          /tmp/cmms-wheel-smoke/bin/pip install dist/*.whl
          /tmp/cmms-wheel-smoke/bin/python -c "import memory_server, storage; assert memory_server.__version__ == '0.11.0b1'"
          /tmp/cmms-wheel-smoke/bin/memory-server --help
          /tmp/cmms-wheel-smoke/bin/python - <<'PY'
          import asyncio
          import os
          import tempfile

          from mcp import ClientSession, StdioServerParameters
          from mcp.client.stdio import stdio_client


          async def main() -> None:
              with tempfile.TemporaryDirectory() as tmpdir:
                  venv_bin = "/tmp/cmms-wheel-smoke/bin"
                  params = StdioServerParameters(
                      command=os.path.join(venv_bin, "memory-server"),
                      args=["serve"],
                      cwd=tmpdir,
                      env={"PATH": venv_bin + ":" + os.environ.get("PATH", "")},
                  )
                  async with stdio_client(params) as (read, write):
                      async with ClientSession(read, write) as session:
                          await session.initialize()
                          result = await session.call_tool("ping", arguments={})
                          assert result.content[0].text == '{"status": "ok"}'

          asyncio.run(asyncio.wait_for(main(), timeout=15))
          PY
